spring.application.name=pointage-backend
server.port=8081

# MongoDB Configuration
# spring.data.mongodb.uri=mongodb://localhost:27017/pointage_db

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=pointage_be;encrypt=true;trustServerCertificate=true
spring.datasource.username=gestion_utilisateur
spring.datasource.password=123456

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update

# ─── SQL Synchronisation Source ────────────────────────────────────────────────
# Configure this to point to your source SQL Server database (HR system, etc.)
# Set sync.enabled=true once the source DB is available
sync.enabled=true
# Use the SAME connection by default (same DB, different tables) - change if needed
sync.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=pointage_be;encrypt=true;trustServerCertificate=true
sync.datasource.username=gestion_utilisateur
sync.datasource.password=123456
# Source table/view for gestionnaires (chargés d'affaires & ingénieurs)
sync.source.gestionnaires.table=gestionnaires_source
# Source table/view for employees
sync.source.employees.table=employees
# Column mappings for gestionnaires source table
sync.source.gestionnaires.col.name=nom
sync.source.gestionnaires.col.email=email
sync.source.gestionnaires.col.role=role
sync.source.gestionnaires.col.siege=siege
# Column mappings for employees source table
sync.source.employees.col.nom=nom
sync.source.employees.col.prenom=prenom
sync.source.employees.col.email=email
sync.source.employees.col.post=post
sync.source.employees.col.departement=departement
sync.source.employees.col.affaire_numero=affaire_numero
sync.source.employees.col.client=client
sync.source.employees.col.site=site

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

